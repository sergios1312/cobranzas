[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
# E741: el codigo usa `l` para "linea" de forma consistente y deliberada.
# UP042: migrar a StrEnum cambiaria el repr de los enums; se mantiene str + Enum.
ignore = ["E741", "UP042"]

[tool.mypy]
python_version = "3.11"
files = ["src"]
ignore_missing_imports = true
check_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true
no_implicit_optional = true
